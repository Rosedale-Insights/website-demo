name: Monthly Template Maintenance

on:
  schedule:
    # 1st of every month at 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - deps
          - docs
          - config

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

# ─────────────────────────────────────────────────────────────────
# Job 1: Dependency Updates
# Updates all packages, has Claude fix any breakage, creates a PR
# ─────────────────────────────────────────────────────────────────
jobs:
  update-deps:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'deps'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install current dependencies
        run: pnpm install --frozen-lockfile

      - name: Record pre-update versions
        run: pnpm list --depth 0 > /tmp/versions-before.txt

      - name: Update all dependencies
        run: pnpm update --latest

      - name: Record post-update versions
        run: pnpm list --depth 0 > /tmp/versions-after.txt

      - name: Generate version diff
        id: diff
        run: |
          diff /tmp/versions-before.txt /tmp/versions-after.txt > /tmp/version-diff.txt || true
          {
            echo 'content<<DIFF_EOF'
            cat /tmp/version-diff.txt
            echo 'DIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code to fix breaking changes
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the file .github/prompts/update-deps.md for your full instructions.

            Here is the version diff from the dependency update:
            ```
            ${{ steps.diff.outputs.content }}
            ```
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "Bash(pnpm *),Bash(node *),Read,Edit,Write,Bash(git *)"

      - name: Run verification checks
        run: |
          pnpm check:fix
          pnpm typecheck
          pnpm build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: maintenance/deps-update-${{ github.run_id }}
          delete-branch: true
          commit-message: 'chore(deps): monthly dependency update'
          title: 'chore(deps): monthly dependency update'
          body: |
            ## Monthly Dependency Update

            Automated dependency update run by Claude Code (Opus).

            ### Version Changes
            ```
            ${{ steps.diff.outputs.content }}
            ```

            ### Verification
            - [x] `pnpm check:fix` passed
            - [x] `pnpm typecheck` passed
            - [x] `pnpm build` passed

            ---
            *Generated by [monthly maintenance workflow](../../.github/workflows/monthly-maintenance.yml)*
          labels: |
            maintenance
            dependencies
            automated
          assignees: grantwilkinson

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Documentation & Implementation Review
  # Checks latest docs for all stack components, updates code + AGENTS.md
  # ─────────────────────────────────────────────────────────────────
  review-docs:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'docs'
    needs: update-deps
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code for docs review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/prompts/review-docs.md
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 40
            --allowedTools "Bash(pnpm *),Bash(node *),Read,Edit,Write,WebSearch,WebFetch,Bash(git *)"

      - name: Run verification checks
        run: |
          pnpm check:fix
          pnpm typecheck
          pnpm build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: maintenance/docs-review-${{ github.run_id }}
          delete-branch: true
          commit-message: 'docs: update stack documentation and implementation patterns'
          title: 'docs: monthly stack documentation review'
          body: |
            ## Monthly Documentation & Implementation Review

            Claude Code (Opus) reviewed the latest documentation for all stack
            components and updated the template implementation accordingly.

            ### Areas Reviewed
            - Next.js App Router
            - Vercel AI SDK + AI Gateway
            - Drizzle ORM + Neon Postgres
            - Tailwind CSS v4
            - shadcn/ui
            - Vercel Blob Storage
            - Biome

            ### Verification
            - [x] `pnpm check:fix` passed
            - [x] `pnpm typecheck` passed
            - [x] `pnpm build` passed

            ---
            *Generated by [monthly maintenance workflow](../../.github/workflows/monthly-maintenance.yml)*
          labels: |
            maintenance
            documentation
            automated
          assignees: grantwilkinson

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Agent Config & Markdown Review
  # Audits all .md files, .claude/ config for accuracy and consistency
  # ─────────────────────────────────────────────────────────────────
  review-config:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'config'
    needs: review-docs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code for config review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/prompts/review-config.md
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 40
            --allowedTools "Bash(pnpm *),Read,Edit,Write,WebSearch,WebFetch,Bash(git *)"

      - name: Run verification checks
        run: |
          pnpm check:fix
          pnpm typecheck
          pnpm build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: maintenance/config-review-${{ github.run_id }}
          delete-branch: true
          commit-message: 'chore: update Claude Code config and documentation'
          title: 'chore: monthly agent config and documentation review'
          body: |
            ## Monthly Agent Config & Documentation Review

            Claude Code (Opus) audited all markdown files, Claude Code configuration,
            rules, skills, and hooks for accuracy and best practices.

            ### Files Reviewed
            - `CLAUDE.md` — project context
            - `AGENTS.md` — compressed stack docs
            - `README.md` — user-facing documentation
            - `.claude/settings.json` — permissions and hooks
            - `.claude/.mcp.json` — MCP server config
            - `.claude/rules/*.md` — path-scoped rules
            - `.claude/skills/*/SKILL.md` — slash command skills
            - `.claude/hooks/biome-format.sh` — PostToolUse hook

            ### Verification
            - [x] `pnpm check:fix` passed
            - [x] `pnpm typecheck` passed
            - [x] `pnpm build` passed

            ---
            *Generated by [monthly maintenance workflow](../../.github/workflows/monthly-maintenance.yml)*
          labels: |
            maintenance
            configuration
            automated
          assignees: grantwilkinson
